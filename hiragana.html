<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hiragana Writing Practice</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 16px 32px;
        }

        h1 {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            letter-spacing: 0.05em;
            color: #a78bfa;
            margin-bottom: 16px;
        }

        #prompt-area {
            text-align: center;
            margin-bottom: 14px;
            min-height: 64px;
        }

        #target {
            font-size: clamp(1.6rem, 6vw, 2.2rem);
            font-weight: bold;
            color: #fff;
        }

        #meaning {
            font-size: 0.95rem;
            color: #94a3b8;
            margin-top: 4px;
        }

        #stroke-hint {
            font-size: 0.85rem;
            color: #7dd3fc;
            margin-top: 6px;
            min-height: 1.2em;
        }

        /* Canvas wrapper holds both the guide SVG and user drawing canvas */
        #canvas-wrapper {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 0 2px #334155, 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        #guide-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #canvas {
            display: block;
            background: #f8f9fa;
            cursor: crosshair;
            touch-action: none;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.15s, transform 0.1s;
        }

        button:active {
            transform: scale(0.96);
        }

        #btn-clear {
            background: #475569;
            color: #fff;
        }

        #btn-check {
            background: #6d28d9;
            color: #fff;
        }

        #btn-next {
            background: #0f766e;
            color: #fff;
        }

        #btn-undo {
            background: #374151;
            color: #cbd5e1;
        }

        #result {
            margin-top: 14px;
            font-size: 1.05rem;
            min-height: 1.4em;
            text-align: center;
            font-weight: 500;
        }

        #result.good {
            color: #4ade80;
        }

        #result.bad {
            color: #f87171;
        }

        #stroke-indicators {
            display: flex;
            gap: 6px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stroke-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #334155;
            border: 2px solid #475569;
            transition: background 0.3s;
        }

        .stroke-dot.done-ok {
            background: #4ade80;
            border-color: #16a34a;
        }

        .stroke-dot.done-bad {
            background: #f87171;
            border-color: #dc2626;
        }

        #progress {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 10px;
        }
    </style>
    <script src="kanjivg-loader.js"></script>
</head>

<body>

    <h1>Hiragana Writing Practice</h1>

    <div id="prompt-area">
        <div id="target"></div>
        <div id="meaning"></div>
        <div id="stroke-hint"></div>
    </div>

    <div id="canvas-wrapper">
        <svg id="guide-svg" xmlns="http://www.w3.org/2000/svg"></svg>
        <canvas id="canvas"></canvas>
    </div>

    <div id="stroke-indicators"></div>

    <div class="buttons">
        <button id="btn-undo" onclick="undoStroke()">Undo</button>
        <button id="btn-clear" onclick="clearAll()">Clear</button>
        <button id="btn-check" onclick="checkWord()">Check</button>
        <button id="btn-next" onclick="nextWord()">Next →</button>
    </div>

    <div id="result"></div>
    <div id="progress"></div>

    <script>
        // ─────────────────────────────────────────────
        //  KanjiVG stroke data (CC BY-SA 3.0, kanjivg.tagaini.net)
        //  Paths are original SVG d-strings from KanjiVG, viewBox 0 0 109 109.
        //  We sample them into point arrays at runtime.
        // ─────────────────────────────────────────────
        const KVG = {
            "あ": [
                "M31.01,33c0.88,0.88,2.75,1.82,5.25,1.75c8.62-0.25,20-2.12,29.5-4.25c1.51-0.34,4.62-0.88,6.62-0.5",
                "M49.76,17.62c0.88,1,1.82,3.26,1.38,5.25c-3.75,16.75-6.25,38.13-5.13,53.63c0.41,5.7,1.88,10.88,3.38,13.62",
                "M65.63,44.12c0.75,1.12,1.16,4.39,0.5,6.12c-4.62,12.26-11.24,23.76-25.37,35.76c-6.86,5.83-15.88,3.75-16.25-8.38c-0.34-10.87,13.38-23.12,32.38-26.74c12.42-2.37,27,1.38,30.5,12.75c4.05,13.18-3.76,26.37-20.88,30.49"
            ],
            "い": [
                "M21.5,29.66c2.01,2.17,2.61,4.68,2.17,7.43c-3.09,19.16-1.03,32.01,7.93,41.45c6.12,6.45,6.26,3.14,7.04-5.21",
                "M72.96,36.51c9.44,8.05,17.79,18.82,18.41,33.83"
            ],
            "う": [
                "M42,15.5c5.62,2.12,9.62,3,12.88,3c8.27,0,8,1.12-0.38,5.5",
                "M33,42.38c2.12,1.12,4.12,2.88,8.5,1.38c4.38-1.5,12.75-7.12,18.5-7c5.75,0.12,10.25,5,10.25,18c0,15.49-8.25,30.24-24.37,41.24"
            ],
            "え": [
                "M40.52,13.25c5.62,2.12,10,3,14.12,3c8.27,0,8,1.12-0.38,5.5",
                "M32.52,45.12c1.88,1.25,4.5,1.75,7.38,0.62c3.29-1.29,17-7.88,21.25-9.88c4.25-2,8.32,0.04,4.38,4.62c-12.26,14.27-27.26,31.52-39.51,44.4c-3.26,3.42-0.58,3.54,1.5,1.37c13.5-14.12,18.12-20.12,23.62-20.12c7.13,0,3.5,16.75,6.75,22.38c3.25,5.63,19.12,3.75,26.12,2.12"
            ],
            "お": [
                "M22.88,35.12c1.38,1,3.62,2.38,6,2.12c2.38-0.26,19.62-5.12,21.12-5.74c1.5-0.62,4-1.25,5.88-2",
                "M41.5,16.12c2.25,1,3.59,4.39,3.12,7.38c-2.5,16.12-3.37,45.53-2.25,58.38c0.75,8.62-0.64,10.45-7.12,7.12c-5.13-2.62-13.75-8-13.75-12.38c0-7.5,24.38-23.62,44.75-23.62c17.25,0,25,8.25,25,17.25c0,8.25-9.38,18.88-26.75,21",
                "M73,22.12c5.38,2.62,8.88,5.88,10.62,8.25c2.27,3.08,0.38,4.5-1.12,5"
            ],
            "ね": [
                "M33.29,14.5c1.62,1.62,2.1,3.21,1.88,5.88c-1.03,11.93-2.06,31.66-2.53,53.12c-0.1,4.62-0.18,9.31-0.22,14",
                "M17.16,37.88c1.62,0.88,3.25,1.38,5.62,0.75c2.14-0.56,7.8-2.31,12.37-4.03c6.26-2.35,6.88-1.47,3.12,3.63c-5.56,7.53-13.02,17.38-18.48,26.77c-5.6,9.62-3.45,8.3,2,3c19.12-18.62,38.5-39.12,54.12-39.12c11.38,0,12.88,11.25,12.88,32.5c0,28.62-30.18,24.88-30.18,16.26c0-9.63,18.73-7.82,28.06-1.88c2.75,1.75,5.88,4.88,7.5,6.75"
            ],
            "こ": [
                "M34.75,26.75c1.12,0.88,2.91,2.01,6,1.5c7.62-1.25,14.11-2.56,22.38-2.62c15.5-0.12,5.88,5-5.75,9",
                "M30,68.12c2.25,14.5,15.26,17.96,31,16.75c6.5-0.5,11.88-1.25,17.62-2.88"
            ],
            "ぬ": [
                "M25.38,28.5c2,1.38,2.97,3.23,3.38,5.88c1.87,12.18,4.12,23.92,8.54,34.67c1.79,4.36,3.96,8.33,6.84,12.46",
                "M57.12,19.25c0.88,2.12,1.06,3.79,0.62,5.88c-3.12,15-13.14,39.81-18.12,48.62c-11.87,21-20.62,1.25-20.62-4.5c0-22.63,43.75-44.25,62.36-29.59c7.66,6.03,9.8,14.58,9.14,23.34c-2,26.75-32.88,28.38-32.88,16.88c0-9.38,17.38-7.12,27.12-1.12c3.1,1.91,7.25,5.25,9.5,7.5"
            ],
            "く": [
                "M60.66,15c0.5,1.62,0.35,5.44-1,7.38c-6.75,9.62-14.3,19.08-18.62,24.5c-4,5-3.79,7.03-0.88,11c5.5,7.5,12.75,18.75,17.62,27.25c1.48,2.59,2.75,4.75,4.5,8.62"
            ],
            "ろ": [
                "M36.95,21.88c1.5,2,4.62,3.62,8.5,2.5c3.88-1.12,8.12-2.25,14.12-4.38c6-2.13,6.53-0.1,3.38,4.25c-7.88,10.88-18,22.75-27.5,35.25c-7.49,9.86-10.68,11.32,2.88,2.25c17.38-11.62,46.62-14,46.62,8.12c0,15.62-16,22.5-32.12,25.12"
            ],
            "し": [
                "M39.12,17.5c1.25,3.12,0.93,6.74,0.38,10.25c-2.12,13.5-3,26.5-3,39.12c0,27.38,19.88,30.12,45.5,17.25"
            ]
        };

        // ─────────────────────────────────────────────
        //  Word list (with missing あう restored)
        // ─────────────────────────────────────────────
        const words = [
            { word: "あい", meaning: "love" },
            { word: "あう", meaning: "to meet" },
            { word: "いえ", meaning: "house" },
            { word: "うえ", meaning: "up" },
            { word: "あお", meaning: "blue" },
            { word: "ねこ", meaning: "cat" },
            { word: "いぬ", meaning: "dog" },
            { word: "くろ", meaning: "black" },
            { word: "しろ", meaning: "white" }
        ];

        // ─────────────────────────────────────────────
        //  SVG path → point array sampler
        // ─────────────────────────────────────────────
        function sampleSVGPath(d, numPts) {
            const svgNS = "http://www.w3.org/2000/svg";
            const tmp = document.createElementNS(svgNS, "svg");
            tmp.style.cssText = "position:absolute;visibility:hidden;width:0;height:0";
            document.body.appendChild(tmp);
            const p = document.createElementNS(svgNS, "path");
            p.setAttribute("d", d);
            tmp.appendChild(p);
            const len = p.getTotalLength();
            const pts = [];
            for (let i = 0; i < numPts; i++) {
                const pt = p.getPointAtLength((i / (numPts - 1)) * len);
                pts.push({ x: pt.x, y: pt.y });
            }
            document.body.removeChild(tmp);
            return pts;
        }

        // KVG viewBox is 109×109.  Scale to canvas size at match-time.
        const KVG_SIZE = 109;
        const SAMPLE_N = 64;

        // Pre-sample all template paths (in KVG coordinate space)
        const templates = {};
        function updateTemplatesForChar(ch, paths) {
            if (!templates[ch]) {
                templates[ch] = paths.map(d => sampleSVGPath(d, SAMPLE_N));
            }
        }
        for (const [char, paths] of Object.entries(KVG)) {
            updateTemplatesForChar(char, paths);
        }

        // ─────────────────────────────────────────────
        //  $1-style recognition helpers
        // ─────────────────────────────────────────────
        function resample(pts, n) {
            let totalLen = 0;
            for (let i = 1; i < pts.length; i++) {
                totalLen += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
            }
            const interval = totalLen / (n - 1);
            let D = 0;
            const out = [{ ...pts[0] }];
            for (let i = 1; i < pts.length; i++) {
                const d = Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
                if (D + d >= interval) {
                    let t = (interval - D) / d;
                    const q = {
                        x: pts[i - 1].x + t * (pts[i].x - pts[i - 1].x),
                        y: pts[i - 1].y + t * (pts[i].y - pts[i - 1].y)
                    };
                    out.push(q);
                    pts = [q, ...pts.slice(i)];
                    i = 1; D = 0;
                } else {
                    D += d;
                }
            }
            while (out.length < n) out.push({ ...pts[pts.length - 1] });
            return out.slice(0, n);
        }

        function centroid(pts) {
            let cx = 0, cy = 0;
            pts.forEach(p => { cx += p.x; cy += p.y; });
            return { x: cx / pts.length, y: cy / pts.length };
        }

        function scaleToSquare(pts, size) {
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            pts.forEach(p => {
                if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
                if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
            });
            const w = maxX - minX || 1, h = maxY - minY || 1;
            return pts.map(p => ({ x: (p.x - minX) / w * size, y: (p.y - minY) / h * size }));
        }

        function translateTo(pts, origin) {
            const c = centroid(pts);
            return pts.map(p => ({ x: p.x + origin.x - c.x, y: p.y + origin.y - c.y }));
        }

        function pathDistance(a, b) {
            let d = 0;
            for (let i = 0; i < a.length; i++) d += Math.hypot(a[i].x - b[i].x, a[i].y - b[i].y);
            return d / a.length;
        }

        function goldenSearch(pts, tmpl, a, b, thresh) {
            const phi = 0.5 * (-1 + Math.sqrt(5));
            let x1 = phi * a + (1 - phi) * b;
            let x2 = (1 - phi) * a + phi * b;
            let f1 = distAtAngle(pts, tmpl, x1);
            let f2 = distAtAngle(pts, tmpl, x2);
            while (Math.abs(b - a) > thresh) {
                if (f1 < f2) { b = x2; x2 = x1; f2 = f1; x1 = phi * a + (1 - phi) * b; f1 = distAtAngle(pts, tmpl, x1); }
                else { a = x1; x1 = x2; f1 = f2; x2 = (1 - phi) * a + phi * b; f2 = distAtAngle(pts, tmpl, x2); }
            }
            return Math.min(f1, f2);
        }

        function rotate(pts, angle) {
            const c = centroid(pts);
            const cos = Math.cos(angle), sin = Math.sin(angle);
            return pts.map(p => ({
                x: (p.x - c.x) * cos - (p.y - c.y) * sin + c.x,
                y: (p.x - c.x) * sin + (p.y - c.y) * cos + c.y
            }));
        }

        function distAtAngle(pts, tmpl, angle) {
            return pathDistance(rotate(pts, angle), tmpl);
        }

        function recognizeStroke(rawPts, tmplPts) {
            // Normalize user stroke
            let u = resample(rawPts, SAMPLE_N);
            u = scaleToSquare(u, 100);
            u = translateTo(u, { x: 50, y: 50 });

            // Normalize template stroke
            let t = resample(tmplPts, SAMPLE_N);
            t = scaleToSquare(t, 100);
            t = translateTo(t, { x: 50, y: 50 });

            const dist = goldenSearch(u, t, -Math.PI / 4, Math.PI / 4, Math.PI / 90);
            // dist of 0 = perfect, typical good match < 20, bad > 40
            return dist;
        }

        // ─────────────────────────────────────────────
        //  Canvas + guide setup
        // ─────────────────────────────────────────────
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const guideSVG = document.getElementById("guide-svg");
        const wrapper = document.getElementById("canvas-wrapper");

        let CANVAS_SIZE = 360;

        function setCanvasSize() {
            CANVAS_SIZE = Math.min(window.innerWidth - 32, 400);
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            wrapper.style.width = CANVAS_SIZE + "px";
            wrapper.style.height = CANVAS_SIZE + "px";
            // Re-apply context style after resize (resize resets context state)
            ctx.lineWidth = 24;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = "#1e293b";
            redrawStrokes();
        }

        // ─────────────────────────────────────────────
        //  State
        // ─────────────────────────────────────────────
        let currentWordIdx = 0;
        let currentCharIdx = 0;   // which character in the word we're on
        let currentStrokeIdx = 0;  // which stroke of that character we're on
        let drawing = false;
        let currentStrokePts = [];
        let completedStrokes = []; // { pts, color } per stroke drawn so far in this char

        // ─────────────────────────────────────────────
        //  Guide overlay
        // ─────────────────────────────────────────────
        function buildGuidePaths(char) {
            guideSVG.innerHTML = "";
            const scale = CANVAS_SIZE / KVG_SIZE;
            const paths = KVG[char];
            if (!paths) return;

            paths.forEach((d, i) => {
                const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                // Scale the path by transforming coordinates
                p.setAttribute("d", d);
                p.setAttribute("transform", `scale(${scale})`);
                p.setAttribute("fill", "none");
                p.setAttribute("stroke", i === currentStrokeIdx ? "rgba(167,139,250,0.25)" : "rgba(167,139,250,0.10)");
                p.setAttribute("stroke-width", (5 * scale).toString());
                p.setAttribute("stroke-linecap", "round");
                p.setAttribute("stroke-linejoin", "round");
                guideSVG.appendChild(p);
            });
        }

        function highlightGuideStroke(idx) {
            const paths = guideSVG.querySelectorAll("path");
            paths.forEach((p, i) => {
                p.setAttribute("stroke", i === idx ? "rgba(167,139,250,0.30)" : "rgba(167,139,250,0.10)");
            });
        }

        // ─────────────────────────────────────────────
        //  Drawing
        // ─────────────────────────────────────────────
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            return { x: src.clientX - rect.left, y: src.clientY - rect.top };
        }

        canvas.addEventListener("mousedown", startDraw);
        canvas.addEventListener("touchstart", startDraw, { passive: true });
        canvas.addEventListener("mousemove", onDraw);
        canvas.addEventListener("touchmove", onDraw, { passive: false });
        canvas.addEventListener("mouseup", endDraw);
        canvas.addEventListener("touchend", endDraw);

        function startDraw(e) {
            drawing = true;
            currentStrokePts = [];
            const pos = getPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            currentStrokePts.push(pos);
        }

        function onDraw(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            currentStrokePts.push(pos);
        }

        function endDraw() {
            if (!drawing || currentStrokePts.length < 5) { drawing = false; return; }
            drawing = false;
            evaluateStroke();
        }

        function redrawStrokes() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            ctx.lineWidth = 24;
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            completedStrokes.forEach(s => {
                ctx.strokeStyle = s.color;
                ctx.beginPath();
                s.pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
                ctx.stroke();
            });
            ctx.strokeStyle = "#1e293b";
        }

        // ─────────────────────────────────────────────
        //  Stroke evaluation
        // ─────────────────────────────────────────────
        const THRESHOLD_GOOD = 28; // dist below this = correct

        function evaluateStroke() {
            const word = words[currentWordIdx].word;
            const char = word[currentCharIdx];
            const tmplStrokes = templates[char];

            if (!tmplStrokes || currentStrokeIdx >= tmplStrokes.length) return;

            const dist = recognizeStroke(currentStrokePts, tmplStrokes[currentStrokeIdx]);
            const ok = dist < THRESHOLD_GOOD;
            const color = ok ? "#16a34a" : "#dc2626";

            completedStrokes.push({ pts: currentStrokePts, color });
            redrawStrokes();
            updateDot(currentStrokeIdx, ok);

            currentStrokeIdx++;

            if (currentStrokeIdx >= tmplStrokes.length) {
                // Finished all strokes for this character
                advanceCharacter(ok);
            } else {
                updateStrokeHint(char);
                highlightGuideStroke(currentStrokeIdx);
            }
        }

        async function advanceCharacter(lastOk) {
            const word = words[currentWordIdx].word;
            currentCharIdx++;
            currentStrokeIdx = 0;
            completedStrokes = [];

            if (currentCharIdx >= word.length) {
                // Word complete
                setResult("✓ Word complete! Press Next for the next word.", "good");
                guideSVG.innerHTML = "";
                updateStrokeHint("");
                return;
            }

            const nextChar = word[currentCharIdx];
            // Fetch missing data
            if (!KVG[nextChar]) {
                const paths = await KanjiVGLoader.fetchPaths(nextChar);
                if (paths) {
                    KVG[nextChar] = paths;
                    updateTemplatesForChar(nextChar, paths);
                }
            }

            // Move to next character
            setTimeout(() => {
                ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
                buildGuidePaths(nextChar);
                buildDots(nextChar);
                updateStrokeHint(nextChar);
                setResult("Now write: " + nextChar, "");
            }, 300);
        }

        // ─────────────────────────────────────────────
        //  UI helpers
        // ─────────────────────────────────────────────
        function setResult(msg, cls) {
            const r = document.getElementById("result");
            r.textContent = msg;
            r.className = cls;
        }

        function updateStrokeHint(char) {
            const el = document.getElementById("stroke-hint");
            if (!char) { el.textContent = ""; return; }
            const tmpl = templates[char];
            if (!tmpl) { el.textContent = ""; return; }
            el.textContent = `Stroke ${currentStrokeIdx + 1} of ${tmpl.length}`;
        }

        function buildDots(char) {
            const el = document.getElementById("stroke-indicators");
            el.innerHTML = "";
            const tmpl = templates[char];
            if (!tmpl) return;
            tmpl.forEach((_, i) => {
                const d = document.createElement("div");
                d.className = "stroke-dot";
                d.id = "dot-" + i;
                el.appendChild(d);
            });
        }

        function updateDot(idx, ok) {
            const d = document.getElementById("dot-" + idx);
            if (d) d.className = "stroke-dot " + (ok ? "done-ok" : "done-bad");
        }

        async function showWord() {
            const word = words[currentWordIdx].word;
            document.getElementById("target").textContent = "Write: " + word;
            document.getElementById("meaning").textContent = "Meaning: " + words[currentWordIdx].meaning;
            document.getElementById("progress").textContent =
                `Word ${currentWordIdx + 1} of ${words.length}`;

            // Fetch missing data for all characters in the word
            for (const char of word) {
                if (!KVG[char]) {
                    const paths = await KanjiVGLoader.fetchPaths(char);
                    if (paths) {
                        KVG[char] = paths;
                        updateTemplatesForChar(char, paths);
                    }
                }
            }

            currentCharIdx = 0;
            currentStrokeIdx = 0;
            completedStrokes = [];
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            setResult("", "");
            buildGuidePaths(word[0]);
            buildDots(word[0]);
            updateStrokeHint(word[0]);
        }

        // ─────────────────────────────────────────────
        //  Controls
        // ─────────────────────────────────────────────
        function clearAll() {
            currentCharIdx = 0;
            currentStrokeIdx = 0;
            completedStrokes = [];
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            setResult("", "");
            const word = words[currentWordIdx].word;
            buildGuidePaths(word[0]);
            buildDots(word[0]);
            updateStrokeHint(word[0]);
        }

        function undoStroke() {
            if (completedStrokes.length === 0 && currentStrokeIdx === 0) return;
            if (currentStrokeIdx > 0) {
                currentStrokeIdx--;
                completedStrokes.pop();
                const dot = document.getElementById("dot-" + currentStrokeIdx);
                if (dot) dot.className = "stroke-dot";
                redrawStrokes();
                const word = words[currentWordIdx].word;
                highlightGuideStroke(currentStrokeIdx);
                updateStrokeHint(word[currentCharIdx]);
                setResult("", "");
            }
        }

        function checkWord() {
            const allDots = document.querySelectorAll(".stroke-dot");
            const total = allDots.length;
            const ok = document.querySelectorAll(".stroke-dot.done-ok").length;
            if (total === 0) { setResult("Draw something first.", "bad"); return; }
            if (ok === total) setResult("✓ All strokes correct!", "good");
            else setResult(`${ok}/${total} strokes matched.`, ok > total / 2 ? "" : "bad");
        }

        function nextWord() {
            currentWordIdx = (currentWordIdx + 1) % words.length;
            showWord();
        }

        // ─────────────────────────────────────────────
        //  Init
        // ─────────────────────────────────────────────
        setCanvasSize();
        window.addEventListener("resize", setCanvasSize);
        showWord();
    </script>
</body>

</html>
