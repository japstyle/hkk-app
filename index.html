<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Japanese Writing Practice</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --border: #2d2d44;
            --text: #e2e8f0;
            --muted: #64748b;
            --hiragana: #a78bfa;
            /* violet */
            --katakana: #38bdf8;
            /* sky blue */
            --kanji: #fb923c;
            /* amber — locked */
            --good: #4ade80;
            --amber: #eab308;
            --bad: #f87171;
        }

        html,
        body {
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
        }

        /* ── Header ─────────────────────────────── */
        header {
            text-align: center;
            padding: 12px 12px 0;
        }

        header h1 {
            font-size: clamp(0.95rem, 3.5vw, 1.3rem);
            letter-spacing: 0.06em;
            color: var(--text);
            opacity: 0.9;
        }

        /* ── Mode tabs ───────────────────────────── */
        #mode-tabs {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 10px auto 0;
            padding: 0 12px;
            max-width: 500px;
        }

        .tab {
            flex: 1;
            padding: 6px 0;
            border: 2px solid var(--border);
            border-radius: 8px;
            background: transparent;
            color: var(--muted);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .tab:hover:not(:disabled) {
            border-color: currentColor;
            opacity: 0.9;
        }

        .tab:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        .tab[data-mode="hiragana"] {
            color: var(--hiragana);
        }

        .tab[data-mode="hiragana"].active {
            background: rgba(167, 139, 250, 0.15);
            border-color: var(--hiragana);
            color: var(--hiragana);
        }

        .tab[data-mode="katakana"] {
            color: var(--katakana);
        }

        .tab[data-mode="katakana"].active {
            background: rgba(56, 189, 248, 0.15);
            border-color: var(--katakana);
            color: var(--katakana);
        }

        .tab[data-mode="kanji"] {
            color: var(--kanji);
        }

        /* ── Search toggle ───────────────────────── */
        #search-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            color: var(--muted);
            padding: 2px 4px;
            line-height: 1;
        }
        #search-toggle:hover {
            color: var(--text);
        }
        #search-area {
            display: none;
            text-align: center;
            padding: 6px 12px 0;
            gap: 6px;
        }
        #search-area.open {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ── Main content ────────────────────────── */
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 12px 24px;
        }

        /* ── Script label ────────────────────────── */
        #script-label {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 6px;
            transition: color 0.3s;
        }

        /* ── Prompt ──────────────────────────────── */
        #prompt-area {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
            min-height: 30px;
        }

        #target {
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            font-weight: bold;
            color: #fff;
        }

        #meaning {
            font-size: 0.8rem;
            color: var(--muted);
        }

        #stroke-hint {
            font-size: 0.75rem;
            color: var(--katakana);
            margin-top: 3px;
            min-height: 1.1em;
            transition: color 0.3s;
        }

        /* ── Canvas ──────────────────────────────── */
        #canvas-wrapper {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 0 0 2px var(--border), 0 12px 40px rgba(0, 0, 0, 0.6);
        }

        #guide-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        #canvas {
            display: block;
            background: #f8f9fa;
            cursor: crosshair;
            touch-action: none;
        }

        /* ── Stroke dots ─────────────────────────── */
        #stroke-indicators {
            display: flex;
            gap: 6px;
            margin-top: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 16px;
        }

        .stroke-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid #334155;
            transition: background 0.25s, border-color 0.25s;
        }

        .stroke-dot.active {
            border-color: #94a3b8;
        }

        .stroke-dot.done-great {
            background: var(--good);
            border-color: #16a34a;
        }

        .stroke-dot.done-good {
            background: #14b8a6;
            border-color: #0d9488;
        }

        .stroke-dot.done-nearly {
            background: var(--amber);
            border-color: #a16207;
        }

        .stroke-dot.done-bad {
            background: var(--bad);
            border-color: #dc2626;
        }

        /* ── Buttons ─────────────────────────────── */
        .buttons {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button.action {
            padding: 8px 16px;
            font-size: 0.85rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.15s, transform 0.1s;
        }

        button.action:active {
            transform: scale(0.95);
        }

        #btn-undo {
            background: #374151;
            color: #cbd5e1;
        }

        #btn-clear {
            background: #475569;
            color: #fff;
        }

        #btn-check {
            background: #6d28d9;
            color: #fff;
        }

        #btn-next {
            background: #0f766e;
            color: #fff;
        }

        /* ── Result & progress ───────────────────── */
        #result {
            margin-top: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            min-height: 1.3em;
        }

        #result.great {
            color: var(--good);
        }

        #result.good {
            color: #14b8a6;
        }

        #result.nearly {
            color: var(--amber);
        }

        #result.bad {
            color: var(--bad);
        }

        #progress {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
        }

        /* ── Attribution ─────────────────────────── */
        footer {
            text-align: center;
            font-size: 0.6rem;
            color: #334155;
            padding: 6px 12px 12px;
            line-height: 1.5;
        }

        footer a {
            color: #475569;
        }

        /* ── Quiz overlay ────────────────────────── */
        #quiz-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 26, 0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        #quiz-modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px 24px 20px;
            max-width: 360px;
            width: 100%;
            text-align: center;
        }

        #quiz-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: 0.06em;
        }

        #quiz-word-display {
            font-size: 2.2rem;
            letter-spacing: 0.15em;
            margin-bottom: 20px;
            min-height: 3rem;
        }

        .quiz-char {
            color: var(--text);
        }

        .quiz-blank {
            display: inline-block;
            color: var(--muted);
            border-bottom: 3px solid var(--amber);
            min-width: 1.2em;
        }

        #quiz-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .quiz-tile {
            width: 64px;
            height: 64px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-tile:hover {
            border-color: var(--muted);
        }

        .quiz-tile.quiz-correct {
            background: rgba(74, 222, 128, 0.2);
            border-color: var(--good);
        }

        .quiz-tile.quiz-wrong {
            background: rgba(248, 113, 113, 0.2);
            border-color: var(--bad);
        }

        #quiz-continue {
            display: none;
            margin: 0 auto;
        }

        #quiz-continue.show {
            display: inline-block;
        }

        #quiz-skip {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 0.8rem;
            cursor: pointer;
            padding: 6px 12px;
        }

        #quiz-skip:hover {
            color: var(--text);
        }
    </style>
    <script src="kanjivg-loader.js"></script>
</head>

<body>

    <header>
        <div style="display:flex; align-items:center; justify-content:center; gap:6px;">
            <h1>Japanese Writing Practice</h1>
            <button id="search-toggle" onclick="toggleSearch()">🔍</button>
        </div>
        <div id="search-area">
            <input type="text" id="custom-char" placeholder="Character..."
                style="background:var(--card); border:1px solid var(--border); color:var(--text); padding:4px 6px; border-radius:4px; width:120px;">
            <button class="action" onclick="practiceCustom()" style="padding:4px 10px; font-size:0.75rem;">Go</button>
        </div>
        <div id="mode-tabs">
            <button class="tab active" data-mode="hiragana" onclick="switchMode('hiragana')">
                ひらがな
            </button>
            <button class="tab" data-mode="katakana" onclick="switchMode('katakana')">
                カタカナ
            </button>
            <button class="tab" data-mode="kanji" onclick="switchMode('kanji')">
                漢字
            </button>
        </div>
    </header>


    <main>
        <div id="script-label"></div>

        <div id="prompt-area">
            <div id="target"></div>
            <div id="meaning"></div>
            <div id="stroke-hint"></div>
        </div>

        <div id="canvas-wrapper">
            <svg id="guide-svg" xmlns="http://www.w3.org/2000/svg"></svg>
            <canvas id="canvas"></canvas>
        </div>

        <div id="stroke-indicators"></div>

        <div class="buttons">
            <button id="btn-undo" class="action" onclick="undoStroke()">Undo</button>
            <button id="btn-clear" class="action" onclick="clearAll()">Clear</button>
            <button id="btn-check" class="action" onclick="checkWord()">Check</button>
            <button id="btn-next" class="action" onclick="nextWord()">Next →</button>
        </div>

        <div id="result"></div>
        <div id="progress"></div>
    </main>

    <div id="quiz-overlay">
        <div id="quiz-modal">
            <div id="quiz-title">✎ Quick Quiz</div>
            <div id="quiz-word-display"></div>
            <div id="quiz-meaning" style="font-size:0.8rem;color:var(--muted);margin-bottom:16px;"></div>
            <div id="quiz-options"></div>
            <button id="quiz-continue" class="action" onclick="dismissQuiz()" style="background:#6d28d9;color:#fff;padding:8px 20px;font-size:0.9rem;">Continue →</button>
            <br><br>
            <button id="quiz-skip" onclick="dismissQuiz()">Skip</button>
        </div>
    </div>

    <footer>
        Stroke data: <a href="http://kanjivg.tagaini.net" target="_blank">KanjiVG</a>
        © Ulrich Apel, <a href="https://creativecommons.org/licenses/by-sa/3.0/" target="_blank">CC BY-SA 3.0</a>
    </footer>

        // ═══════════════════════════════════════════════════════
        //  WORD LISTS
        // ═══════════════════════════════════════════════════════
        const MODES = {
            hiragana: {
                label: "ひらがな · Hiragana",

                    { word: "あい", meaning: "love" },

        // ═══════════════════════════════════════════════════════
        //  $1-STYLE RECOGNITION ENGINE
        // ═══════════════════════════════════════════════════════
        const KVG_SIZE = 109;
        const SAMPLE_N = 64;
        const THRESHOLD = 38;

        function samplePath(d, n) {
            const ns = "http://www.w3.org/2000/svg";
            const svg = document.createElementNS(ns, "svg");
            svg.style.cssText = "position:absolute;visibility:hidden;width:0;height:0";
            document.body.appendChild(svg);
            const p = document.createElementNS(ns, "path");
            p.setAttribute("d", d);
            svg.appendChild(p);
            const len = p.getTotalLength();
            const pts = [];
            for (let i = 0; i < n; i++) {
                const pt = p.getPointAtLength((i / (n - 1)) * len);
                pts.push({ x: pt.x, y: pt.y });
            }
            document.body.removeChild(svg);
            return pts;
        }

        // Pre-sample all templates once
        // Updated to be more flexible for dynamic loading
        const templates = {};
        function updateTemplatesForChar(ch, paths) {
            if (!templates[ch]) {
                templates[ch] = paths.map(d => samplePath(d, SAMPLE_N));
            }
        }

        for (const [ch, paths] of Object.entries(KVG)) {
            updateTemplatesForChar(ch, paths);
        }

        function resample(pts, n) {
            let total = 0;
            for (let i = 1; i < pts.length; i++)
                total += Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
            const interval = total / (n - 1);
            let D = 0;
            const out = [{ ...pts[0] }];
            for (let i = 1; i < pts.length; i++) {
                const d = Math.hypot(pts[i].x - pts[i - 1].x, pts[i].y - pts[i - 1].y);
                if (D + d >= interval) {
                    const t = (interval - D) / d;
                    const q = { x: pts[i - 1].x + t * (pts[i].x - pts[i - 1].x), y: pts[i - 1].y + t * (pts[i].y - pts[i - 1].y) };
                    out.push(q);
                    pts = [q, ...pts.slice(i)]; i = 1; D = 0;
                } else D += d;
            }
            while (out.length < n) out.push({ ...pts[pts.length - 1] });
            return out.slice(0, n);
        }

        function centroid(pts) {
            let cx = 0, cy = 0;
            pts.forEach(p => { cx += p.x; cy += p.y; });
            return { x: cx / pts.length, y: cy / pts.length };
        }

        function scaleToBox(pts, sz) {
            let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;
            pts.forEach(p => { if (p.x < mnX) mnX = p.x; if (p.x > mxX) mxX = p.x; if (p.y < mnY) mnY = p.y; if (p.y > mxY) mxY = p.y; });
            const w = mxX - mnX || 1, h = mxY - mnY || 1;
            return pts.map(p => ({ x: (p.x - mnX) / w * sz, y: (p.y - mnY) / h * sz }));
        }

        function translateTo(pts, o) {
            const c = centroid(pts);
            return pts.map(p => ({ x: p.x + o.x - c.x, y: p.y + o.y - c.y }));
        }

        function pathDist(a, b) {
            let d = 0;
            for (let i = 0; i < a.length; i++) d += Math.hypot(a[i].x - b[i].x, a[i].y - b[i].y);
            return d / a.length;
        }

        function rotPts(pts, ang) {
            const c = centroid(pts), cos = Math.cos(ang), sin = Math.sin(ang);
            return pts.map(p => ({ x: (p.x - c.x) * cos - (p.y - c.y) * sin + c.x, y: (p.x - c.x) * sin + (p.y - c.y) * cos + c.y }));
        }

        function goldenSearch(u, t, a, b, thr) {
            const phi = 0.5 * (-1 + Math.sqrt(5));
            let x1 = phi * a + (1 - phi) * b, x2 = (1 - phi) * a + phi * b;
            let f1 = pathDist(rotPts(u, x1), t), f2 = pathDist(rotPts(u, x2), t);
            while (Math.abs(b - a) > thr) {
                if (f1 < f2) { b = x2; x2 = x1; f2 = f1; x1 = phi * a + (1 - phi) * b; f1 = pathDist(rotPts(u, x1), t); }
                else { a = x1; x1 = x2; f1 = f2; x2 = (1 - phi) * a + phi * b; f2 = pathDist(rotPts(u, x2), t); }
            }
            return Math.min(f1, f2);
        }

        function recognizeStroke(raw, tmplPts) {
            let u = resample(raw, SAMPLE_N);
            u = scaleToBox(u, 100);
            u = translateTo(u, { x: 50, y: 50 });
            let t = resample(tmplPts, SAMPLE_N);
            t = scaleToBox(t, 100);
            t = translateTo(t, { x: 50, y: 50 });
            return goldenSearch(u, t, -Math.PI / 4, Math.PI / 4, Math.PI / 90);
        }

        // ═══════════════════════════════════════════════════════
        //  UI STATE
        // ═══════════════════════════════════════════════════════
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const guideSVG = document.getElementById("guide-svg");
        const wrapper = document.getElementById("canvas-wrapper");

        let CANVAS_SIZE = 320;
        let currentMode = "hiragana";
        let currentWordIdx = 0;
        let currentCharIdx = 0;
        let currentStrokeIdx = 0;
        let drawing = false;
        let currentStrokePts = [];
        let completedStrokes = [];
        let quizActive = false;

        function getCurrentCharAndStroke() {
            // Derive current position from completed stroke count
            const word = MODES[currentMode].words[currentWordIdx].word;
            let remaining = completedStrokes.length;
            for (let ci = 0; ci < word.length; ci++) {
                const paths = KVG[word[ci]];
                const n = paths ? paths.length : 0;
                if (remaining < n) return { charIdx: ci, strokeIdx: remaining };
                remaining -= n;
            }
            return null; // all strokes complete
        }

        function totalStrokesInWord(word) {
            let n = 0;
            for (const ch of word) {
                const p = KVG[ch];
                if (p) n += p.length;
            }
            return n;
        }

        // ── Resize ────────────────────────────────────────────
        function setCanvasSize() {
            CANVAS_SIZE = Math.min(window.innerWidth - 32, 340);
            canvas.width = CANVAS_SIZE;
            canvas.height = CANVAS_SIZE;
            wrapper.style.width = CANVAS_SIZE + "px";
            wrapper.style.height = CANVAS_SIZE + "px";
            applyCtxStyle();
            redrawStrokes();
        }
        function applyCtxStyle() {
            ctx.lineWidth = Math.round(5.5 * CANVAS_SIZE / KVG_SIZE);
            ctx.lineCap = "round";
            ctx.lineJoin = "round";
            ctx.strokeStyle = "#1e293b";
        }

        // ── Mode switch ───────────────────────────────────────
        function switchMode(mode) {
            if (mode === currentMode) return;
            currentMode = mode;
            currentWordIdx = 0;
            wordHistory = [];
            completedWords = 0;
            // Update tab styles
            document.querySelectorAll(".tab[data-mode]").forEach(t => {
                t.classList.toggle("active", t.dataset.mode === mode);
            });
            // Update accent colour on hint
            const hex = MODES[mode].accentHex;
            document.getElementById("stroke-hint").style.color = hex;
            showWord();
        }

        // ── Guide overlay ─────────────────────────────────────
        function buildWordGuide(word) {
            guideSVG.innerHTML = "";
            const n = word.length;
            const scale = CANVAS_SIZE / KVG_SIZE;
            const regionScale = scale / n;
            const accent = MODES[currentMode].accentHex;
            let gidx = 0;
            for (let ci = 0; ci < n; ci++) {
                const paths = KVG[word[ci]];
                if (!paths) continue;
                const tx = ci * CANVAS_SIZE / n;
                paths.forEach((d) => {
                    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    p.setAttribute("d", d);
                    p.setAttribute("transform", `translate(${tx},0) scale(${regionScale})`);
                    p.setAttribute("fill", "none");
                    p.setAttribute("stroke", `${accent}1a`);
                    p.setAttribute("stroke-width", (5 * regionScale).toString());
                    p.setAttribute("stroke-linecap", "round");
                    p.setAttribute("stroke-linejoin", "round");
                    p.dataset.gidx = gidx++;
                    guideSVG.appendChild(p);
                });
            }
        }

        function highlightGuide(globalIdx) {
            const accent = MODES[currentMode].accentHex;
            guideSVG.querySelectorAll("path").forEach(p => {
                const gidx = parseInt(p.dataset.gidx);
                p.setAttribute("stroke", gidx === globalIdx ? `${accent}44` : `${accent}1a`);
            });
        }

        // ── Drawing ───────────────────────────────────────────
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            return { x: src.clientX - rect.left, y: src.clientY - rect.top };
        }

        canvas.addEventListener("mousedown", startDraw);
        canvas.addEventListener("touchstart", startDraw, { passive: true });
        canvas.addEventListener("mousemove", onDraw);
        canvas.addEventListener("touchmove", onDraw, { passive: false });
        canvas.addEventListener("mouseup", endDraw);
        canvas.addEventListener("touchend", endDraw);

        function startDraw(e) {
            drawing = true;
            currentStrokePts = [];
            const pos = getPos(e);
            applyCtxStyle();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            currentStrokePts.push(pos);
        }
        function onDraw(e) {
            if (!drawing) return;
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);
            const prev = currentStrokePts[currentStrokePts.length - 1];
            currentStrokePts.push(pos);
            // Draw each segment independently — avoids overlapping stroke artifacts
            // and keeps feedback responsive. Completed strokes are smoothed
            // in redrawStrokes() via quadratic bezier curves.
            if (prev) {
                ctx.beginPath();
                ctx.moveTo(prev.x, prev.y);
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            }
        }
        function endDraw() {
            if (!drawing || currentStrokePts.length < 5) { drawing = false; return; }
            drawing = false;
            evaluateStroke();
        }

        // ── Smooth stroke rendering ───────────────────────────
        function drawSmoothStroke(ctx, pts) {
            if (pts.length < 2) return;
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            if (pts.length === 2) {
                ctx.lineTo(pts[1].x, pts[1].y);
            } else {
                // Quadratic bezier through midpoints — smooth Catmull-Rom-like curves
                for (let i = 1; i < pts.length - 1; i++) {
                    const mx = (pts[i].x + pts[i + 1].x) / 2;
                    const my = (pts[i].y + pts[i + 1].y) / 2;
                    ctx.quadraticCurveTo(pts[i].x, pts[i].y, mx, my);
                }
                ctx.lineTo(pts[pts.length - 1].x, pts[pts.length - 1].y);
            }
            ctx.stroke();
        }

        function redrawStrokes() {
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            completedStrokes.forEach(s => {
                ctx.strokeStyle = s.color;
                drawSmoothStroke(ctx, s.pts);
            });
        }

        // ── Stroke evaluation ─────────────────────────────────
        function evaluateStroke() {
            const word = MODES[currentMode].words[currentWordIdx].word;
            const nChars = word.length;

            // Determine which character region the stroke was drawn in
            const cx = currentStrokePts.reduce((s, p) => s + p.x, 0) / currentStrokePts.length;
            const drawnCharIdx = Math.min(Math.floor(cx / (CANVAS_SIZE / nChars)), nChars - 1);

            // What stroke is expected next?
            const expected = getCurrentCharAndStroke();
            if (!expected) return; // word already complete

            const char = word[expected.charIdx];
            const tmplStrokes = templates[char];
            if (!tmplStrokes || expected.strokeIdx >= tmplStrokes.length) return;

            // Must draw in the correct character's region
            if (drawnCharIdx !== expected.charIdx) {
                setResult(`Draw next stroke in the 「${char}」 region`, "bad");
                return;
            }

            const dist = recognizeStroke(currentStrokePts, tmplStrokes[expected.strokeIdx]);
            const rating = dist < 15 ? "great" : dist < 28 ? "good" : dist < THRESHOLD ? "nearly" : "tryagain";
            const colorMap = { great: "#22c55e", good: "#14b8a6", nearly: "#eab308", tryagain: "#ef4444" };
            const resultMap = { great: "✓ Great!", good: "✓ Good", nearly: "~ Nearly", tryagain: "✗ Try again" };
            completedStrokes.push({ pts: currentStrokePts, color: colorMap[rating] });
            redrawStrokes();
            updateDot(completedStrokes.length - 1, rating);
            const resultClass = rating === "tryagain" ? "bad" : rating === "nearly" ? "nearly" : rating === "good" ? "good" : "great";
            setResult(resultMap[rating], resultClass);

            // Check if word is complete
            const next = getCurrentCharAndStroke();
            if (!next) {
                setResult("✓ Word complete! Press Next →", "good");
                updateGlobalHint(word);
            } else {
                updateGlobalHint(word);
                highlightGuide(completedStrokes.length);
            }
        }

        function advanceCharacter() {
            // No-op in multi-char view — evaluateStroke handles sequencing
            // Characters are tracked implicitly via completedStrokes.length
        }

        // ── UI helpers ────────────────────────────────────────
        function setResult(msg, cls) {
            const el = document.getElementById("result");
            el.textContent = msg;
            el.className = cls;
        }

        function updateGlobalHint(word) {
            const el = document.getElementById("stroke-hint");
            const expected = getCurrentCharAndStroke();
            if (!expected) { el.textContent = "Word complete!"; return; }
            const char = word[expected.charIdx];
            const tmpl = templates[char];
            el.textContent = tmpl
                ? `「${char}」 stroke ${expected.strokeIdx + 1} of ${tmpl.length}`
                : "";
        }

        function buildWordDots(word) {
            const el = document.getElementById("stroke-indicators");
            el.innerHTML = "";
            const total = totalStrokesInWord(word);
            for (let i = 0; i < total; i++) {
                const d = document.createElement("div");
                d.className = "stroke-dot" + (i === 0 ? " active" : "");
                d.id = "dot-" + i;
                el.appendChild(d);
            }
        }

        function updateDot(idx, rating) {
            const dotClass = rating === "great" ? "done-great" : rating === "good" ? "done-good" : rating === "nearly" ? "done-nearly" : "done-bad";
            const d = document.getElementById("dot-" + idx);
            if (d) d.className = "stroke-dot " + dotClass;
            const next = document.getElementById("dot-" + (idx + 1));
            if (next) next.classList.add("active");
        }

        async function showWord() {
            const data = MODES[currentMode];
            document.getElementById("script-label").textContent = data.label;
            document.getElementById("script-label").style.color = data.accentHex;
            document.getElementById("stroke-hint").style.color = data.accentHex;

            const entry = data.words[currentWordIdx];
            document.getElementById("target").textContent = "Write: " + entry.word;
            document.getElementById("meaning").textContent = "Meaning: " + entry.meaning;
            document.getElementById("progress").textContent =
                `Word ${currentWordIdx + 1} of ${data.words.length}`;

            // Fetch missing data for all characters in the word
            let fetchFailed = false;
            for (const char of entry.word) {
                if (!KVG[char]) {
                    setResult(`Fetching character data: ${char}...`, "");
                    const paths = await KanjiVGLoader.fetchPaths(char);
                    if (paths) {
                        KVG[char] = paths;
                        updateTemplatesForChar(char, paths);
                    } else {
                        setResult(`Could not find stroke data for ${char}`, "bad");
                        fetchFailed = true;
                    }
                }
            }

            completedStrokes = [];
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

            const allHaveData = [...entry.word].every(ch => KVG[ch]);
            if (allHaveData) {
                buildWordGuide(entry.word);
                buildWordDots(entry.word);
                updateGlobalHint(entry.word);
                highlightGuide(completedStrokes.length);
                setResult(fetchFailed ? "Some characters may not have stroke data." : "", fetchFailed ? "bad" : "");
            } else {
                setResult("Stroke data unavailable for some characters.", "bad");
                guideSVG.innerHTML = "";
                document.getElementById("stroke-indicators").innerHTML = "";
                document.getElementById("stroke-hint").textContent = "";
            }
        }

        // ── Controls ──────────────────────────────────────────
        function clearAll() {
            completedStrokes = [];
            ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            setResult("", "");
            const word = MODES[currentMode].words[currentWordIdx].word;
            buildWordDots(word);
            updateGlobalHint(word);
            highlightGuide(0);
        }

        function undoStroke() {
            if (completedStrokes.length === 0) return;
            completedStrokes.pop();
            redrawStrokes();
            const totalNow = completedStrokes.length;
            // Reset dot states
            document.querySelectorAll(".stroke-dot").forEach((d, i) => {
                d.className = "stroke-dot" + (i === totalNow ? " active" : "");
            });
            const word = MODES[currentMode].words[currentWordIdx].word;
            highlightGuide(totalNow);
            updateGlobalHint(word);
            setResult("", "");
        }

        function checkWord() {
            const all = document.querySelectorAll(".stroke-dot");
            const great = document.querySelectorAll(".stroke-dot.done-great").length;
            const good = document.querySelectorAll(".stroke-dot.done-good").length;
            const nearly = document.querySelectorAll(".stroke-dot.done-nearly").length;
            const ok = great + good + nearly;
            if (all.length === 0) { setResult("Draw something first.", "bad"); return; }
            setResult(
                ok === all.length
                    ? `✓ ${great} great, ${good} good, ${nearly} nearly`
                    : `${ok}/${all.length} strokes passed`,
                ok === all.length ? "good" : (ok > all.length / 2 ? "nearly" : "bad")
            );
        }

        function nextWord() {
            const words = MODES[currentMode].words;
            // Record completed word for quiz pool
            wordHistory.push(words[currentWordIdx]);
            completedWords++;

            currentWordIdx = (currentWordIdx + 1) % words.length;

            // Trigger quiz every N words
            if (completedWords >= QUIZ_INTERVAL && completedWords % QUIZ_INTERVAL === 0) {
                showQuiz();
                return;
            }
            showWord();
        }

        function toggleSearch() {
            const area = document.getElementById("search-area");
            area.classList.toggle("open");
            if (area.classList.contains("open")) {
                document.getElementById("custom-char").focus();
            }
        }

        async function practiceCustom() {
            const val = document.getElementById("custom-char").value.trim();
            if (!val) return;

            // Artificial entry
            MODES[currentMode].words.push({ word: val, meaning: "Custom search" });
            currentWordIdx = MODES[currentMode].words.length - 1;
            await showWord();
        }

        // ── Quiz system ───────────────────────────────────────
        const QUIZ_INTERVAL = 4;
        let wordHistory = [];
        let completedWords = 0;
        let quizAnswered = false;

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function showQuiz() {
            quizActive = true;
            quizAnswered = false;
            document.getElementById("quiz-overlay").style.display = "flex";
            document.getElementById("quiz-continue").classList.remove("show");

            // Pick a random word from history
            const entry = wordHistory[Math.floor(Math.random() * wordHistory.length)];
            const word = entry.word;
            const blankIdx = Math.floor(Math.random() * word.length);

            // Find ALL valid characters for this blank from practiced words
            // e.g. あ? accepts both い (あい) and う (あう)
            const validChars = new Set();
            for (const he of wordHistory) {
                if (he.word.length === word.length) {
                    let match = true;
                    for (let i = 0; i < word.length; i++) {
                        if (i !== blankIdx && he.word[i] !== word[i]) { match = false; break; }
                    }
                    if (match) validChars.add(he.word[blankIdx]);
                }
            }

            // Build distractors from characters NOT in valid set
            const pool = [...new Set(wordHistory.flatMap(e => [...e.word]))]
                .filter(c => !validChars.has(c));
            const distractors = shuffle(pool).slice(0, 3);
            const options = shuffle([...distractors, ...validChars]);

            // Render word display
            const displayEl = document.getElementById("quiz-word-display");
            displayEl.innerHTML = "";
            [...word].forEach((ch, i) => {
                const span = document.createElement("span");
                span.textContent = i === blankIdx ? "？" : ch;
                span.className = i === blankIdx ? "quiz-blank" : "quiz-char";
                displayEl.appendChild(span);
            });

            // Show meaning for context
            document.getElementById("quiz-meaning").textContent = "Meaning: " + entry.meaning;

            // Render option tiles
            const optionsEl = document.getElementById("quiz-options");
            optionsEl.innerHTML = "";
            options.forEach(ch => {
                const tile = document.createElement("button");
                tile.textContent = ch;
                tile.className = "quiz-tile";
                tile.onclick = () => {
                    if (quizAnswered) return;
                    quizAnswered = true;
                    const ok = validChars.has(ch);
                    document.querySelectorAll(".quiz-tile").forEach(t => {
                        t.onclick = null;
                        if (validChars.has(t.textContent)) t.classList.add("quiz-correct");
                        else if (t.textContent === ch) t.classList.add("quiz-wrong");
                    });
                    const validList = [...validChars].join("「");
                    const msg = ok
                        ? validChars.size > 1 ? `✓ Quiz: 「${ch}」 works!` : "✓ Quiz: Correct!"
                        : `✗ Quiz: Try 「${[...validChars].join("」 or 「")}」`;
                    setResult(msg, ok ? "good" : "bad");
                    document.getElementById("quiz-continue").classList.add("show");
                };
                optionsEl.appendChild(tile);
            });
        }

        function dismissQuiz() {
            document.getElementById("quiz-overlay").style.display = "none";
            quizActive = false;
            showWord();
        }

        // ── Init ──────────────────────────────────────────────
        setCanvasSize();
        window.addEventListener("resize", setCanvasSize);
        showWord();
    </script>
</body>
